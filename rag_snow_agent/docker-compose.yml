version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.chroma:/app/.chroma
    env_file:
      - .env
    environment:
      - DATASOURCE=sqlite
      - SQLITE_MIRROR_PATH=/app/data/mirror.db
      - SESSION_DB_PATH=/app/data/sessions.db
      - CHROMA_DIR=/app/.chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
