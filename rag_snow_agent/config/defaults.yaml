# Default configuration for rag_snow_agent.

retrieval:
  top_k_tables: 8
  top_k_columns: 25
  max_schema_tokens: 2500
  rrf_k: 60

llm:
  model: gpt-4o-mini
  temperature: 0.2
  max_output_tokens: null  # no limit — model generates until done

agent:
  plan_retry_limit: 1
  validation_fix_limit: 1

indexing:
  gold_sql_dir: Spider2/spider2-snow/evaluation_suite/gold/sql/
  ingest_gold_joins: true
